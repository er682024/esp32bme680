<!DOCTYPE html><html lang='it'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>ESP32 BME680 Monitor</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}h1{font-size:1.4rem;color:#58a6ff;margin-bottom:0.3rem;letter-spacing:2px;text-transform:uppercase}#clock{font-size:2.2rem;font-weight:bold;color:#f0f6fc;margin-bottom:2rem;letter-spacing:3px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.2rem;width:100%;max-width:480px}.card{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:1.4rem;display:flex;flex-direction:column;align-items:center;gap:0.4rem;transition:border-color .3s}.card:hover{border-color:#58a6ff}.icon{font-size:2.2rem}.label{font-size:0.75rem;color:#8b949e;text-transform:uppercase;letter-spacing:1px}.value{font-size:2rem;font-weight:bold;color:#f0f6fc}.unit{font-size:0.85rem;color:#8b949e}#temp  .value{color:#ff7b72}#hum   .value{color:#79c0ff}#pres  .value{color:#a5d6ff}#gas   .value{color:#7ee787}.status{margin-top:1.5rem;font-size:0.75rem;color:#484f58}</style></head><body><h1>&#x1F4E1; BME680 Monitor</h1><div id='clock'>--:--:--</div><div class='grid'>  <div class='card' id='temp'>    <span class='icon'>&#x1F321;</span>    <span class='label'>Temperatura</span>    <span class='value' id='v-temp'>--.-</span>    <span class='unit'>&deg;C</span>  </div>  <div class='card' id='hum'>    <span class='icon'>&#x1F4A7;</span>    <span class='label'>Umidità</span>    <span class='value' id='v-hum'>--.-</span>    <span class='unit'>%</span>  </div>  <div class='card' id='pres'>    <span class='icon'>&#x1F30D;</span>    <span class='label'>Pressione</span>    <span class='value' id='v-pres'>----</span>    <span class='unit'>hPa</span>  </div>  <div class='card' id='gas'>    <span class='icon'>&#x1F32C;</span>    <span class='label'>Gas</span>    <span class='value' id='v-gas'>----</span>    <span class='unit'>&Omega;</span>  </div></div><div class='status' id='status'>Connessione...</div><script>async function fetchData() {  try {    const r = await fetch('/data');    if (!r.ok) { document.getElementById('status').textContent = 'Errore auth'; return; }    const d = await r.json();    document.getElementById('clock').textContent   = d.time;    document.getElementById('v-temp').textContent  = d.temperature.toFixed(1);    document.getElementById('v-hum').textContent   = d.humidity.toFixed(1);    document.getElementById('v-pres').textContent  = d.pressure.toFixed(1);    document.getElementById('v-gas').textContent   = d.gas;    document.getElementById('status').textContent  = 'Aggiornato: ' + new Date().toLocaleTimeString();  } catch(e) {    document.getElementById('status').textContent = 'Errore connessione';  }}fetchData();setInterval(fetchData, 2000);</script></body></html>
